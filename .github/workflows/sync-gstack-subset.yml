name: Sync curated gstack skills

on:
  schedule:
    - cron: "41 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Sync the latest main commit even when VERSION is unchanged
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-gstack-subset
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Fetch upstream gstack
        id: upstream
        env:
          FORCE_SYNC: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
        run: |
          upstream="$RUNNER_TEMP/gstack"
          git clone --depth 1 https://github.com/garrytan/gstack.git "$upstream"
          old_version=$(python3 -c 'import json; print(json.load(open("external/gstack/manifest.json"))["upstream_version"])')
          old_commit=$(python3 -c 'import json; print(json.load(open("external/gstack/manifest.json"))["upstream_commit"])')
          new_version=$(tr -d '\r\n' < "$upstream/VERSION")
          new_commit=$(git -C "$upstream" rev-parse HEAD)

          echo "path=$upstream" >> "$GITHUB_OUTPUT"
          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          echo "old_commit=$old_commit" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "new_commit=$new_commit" >> "$GITHUB_OUTPUT"
          if [ "$FORCE_SYNC" != "true" ] && [ "$old_version" = "$new_version" ]; then
            echo "gstack VERSION is unchanged ($new_version)"
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_sync=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        if: steps.upstream.outputs.should_sync == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Generate curated snapshots
        if: steps.upstream.outputs.should_sync == 'true'
        run: python3 scripts/sync-gstack-subset.py --upstream-dir "${{ steps.upstream.outputs.path }}"

      - name: Commit upstream changes
        if: steps.upstream.outputs.should_sync == 'true'
        id: changes
        run: |
          git add --all -- external/gstack
          if git diff --cached --quiet -- external/gstack; then
            echo "curated gstack snapshots are already up to date"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_skills=$(git diff --cached --name-only -- external/gstack/skills \
            | cut -d/ -f4 | sort -u | paste -sd, -)
          [ -n "$changed_skills" ] || changed_skills="metadata/license only"
          echo "changed_skills=$changed_skills" >> "$GITHUB_OUTPUT"

          branch="automation/sync-gstack"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git commit -m "chore(gstack): sync upstream ${{ steps.upstream.outputs.new_version }}"
          remote_sha=$(git ls-remote --heads origin "refs/heads/$branch" | cut -f1)
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/$branch:$remote_sha" origin "HEAD:refs/heads/$branch"
          else
            git push origin "HEAD:refs/heads/$branch"
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or refresh pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/sync-gstack"
          body_file="$RUNNER_TEMP/gstack-pr-body.md"
          cat > "$body_file" <<EOF
          Automated curated sync from `garrytan/gstack`.

          - Version: `${{ steps.upstream.outputs.old_version }}` -> `${{ steps.upstream.outputs.new_version }}`
          - Commit: `${{ steps.upstream.outputs.old_commit }}` -> `${{ steps.upstream.outputs.new_commit }}`
          - Changed selected skills: `${{ steps.changes.outputs.changed_skills }}`
          - Scope: the 13 selected Claude/Codex snapshots, manifest, and upstream license
          EOF

          pr_number=$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number // empty')
          if [ -z "$pr_number" ]; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(gstack): sync curated skills" \
              --body-file "$body_file"
          else
            gh pr edit "$pr_number" \
              --title "chore(gstack): sync curated skills" \
              --body-file "$body_file"
          fi
